stages:
  - install
  - build
  - deploy

variables:
  NODE_ENV: 'production'

cache:
  paths:
    - node_modules/

install_dependencies:
  stage: install
  image: node:20
  script:
    - npm ci
  artifacts:
    paths:
      - node_modules/

build_site:
  stage: build
  image: node:20
  script:
    # NEXT_PUBLIC_* variables (Firebase config) should be set in GitLab CI variables
    - npm run build
  artifacts:
    paths:
      - .next/
      - node_modules/
  only:
    - main

deploy_to_firebase:
  stage: deploy
  image: node:20
  script:
    - npx firebase-tools@latest deploy --only hosting --project "$FIREBASE_PROJECT_ID" --token "$FIREBASE_TOKEN"
  only:
    - main
