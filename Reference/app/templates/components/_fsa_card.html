<div class="card h-100 shadow-sm fsa-card">
    <img src="{{ url_for('static', filename=fsa.primary_image) }}" class="card-img-top" alt="{{ fsa.title }}"
         style="height: 200px; object-fit: cover;"
         onerror="this.src='https://placehold.co/400x200/e8f5e9/2e7d32?text=FundBridge'">
    <div class="card-body d-flex flex-column">
        <span class="badge bg-primary mb-2 align-self-start">{{ fsa.category.name }}</span>
        <h5 class="card-title">{{ fsa.title }}</h5>
        <p class="card-text text-muted small">{{ fsa.description[:100] }}{% if fsa.description|length > 100 %}...{% endif %}</p>
        <div class="mt-auto">
            <div class="progress mb-2" style="height: 8px;">
                <div class="progress-bar bg-success" role="progressbar"
                     style="width: {{ fsa.progress_percentage }}%"
                     aria-valuenow="{{ fsa.progress_percentage }}" aria-valuemin="0" aria-valuemax="100">
                </div>
            </div>
            <div class="d-flex justify-content-between small">
                <span class="fw-bold text-success">{{ fsa.current_amount|currency }}</span>
                <span class="text-muted">of {{ fsa.goal_amount|currency }}</span>
            </div>
        </div>
    </div>
    <div class="card-footer bg-white d-flex justify-content-between align-items-center">
        <small class="text-muted"><i class="bi bi-people"></i> {{ fsa.donor_count }} donors</small>
        <a href="{{ detail_url or url_for('main.fsa_detail', id=fsa.id) }}" class="btn btn-sm btn-outline-primary">View</a>
    </div>
</div>
