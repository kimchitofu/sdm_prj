{% extends 'base.html' %}
{% block title %}Create Campaign - FundBridge{% endblock %}
{% block content %}
<div class="container py-4">
    <h2><i class="bi bi-plus-circle me-2"></i>Create New Campaign</h2>
    <hr>
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-3">
                            <label for="title" class="form-label">Campaign Title *</label>
                            <input type="text" class="form-control" id="title" name="title" required maxlength="200"
                                   placeholder="Give your campaign a clear, compelling title">
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">Description *</label>
                            <textarea class="form-control" id="description" name="description" rows="6" required
                                      placeholder="Tell your story. Why are you raising funds?"></textarea>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="goal_amount" class="form-label">Goal Amount ($) *</label>
                                <input type="number" class="form-control" id="goal_amount" name="goal_amount"
                                       min="1" step="0.01" required placeholder="e.g. 5000">
                            </div>
                            <div class="col-md-6">
                                <label for="category_id" class="form-label">Category *</label>
                                <select class="form-select" id="category_id" name="category_id" required>
                                    <option value="">Select a category</option>
                                    {% for cat in categories %}
                                        <option value="{{ cat.id }}">{{ cat.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="end_date" class="form-label">End Date (optional)</label>
                            <input type="date" class="form-control" id="end_date" name="end_date">
                        </div>
                        <div class="mb-3">
                            <label for="images" class="form-label">Campaign Images</label>
                            <input type="file" class="form-control" id="images" name="images" accept="image/*" multiple>
                            <div class="form-text">Upload up to 5 images. The first image will be the primary image.</div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">Create Campaign</button>
                            <a href="{{ url_for('fundraiser.fsa_list') }}" class="btn btn-outline-secondary btn-lg">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
