{% extends 'base.html' %}
{% block title %}Edit: {{ fsa.title }} - FundBridge{% endblock %}
{% block content %}
<div class="container py-4">
    <h2><i class="bi bi-pencil me-2"></i>Edit Campaign</h2>
    <hr>
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-3">
                            <label for="title" class="form-label">Campaign Title *</label>
                            <input type="text" class="form-control" id="title" name="title" value="{{ fsa.title }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">Description *</label>
                            <textarea class="form-control" id="description" name="description" rows="6" required>{{ fsa.description }}</textarea>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="goal_amount" class="form-label">Goal Amount ($) *</label>
                                <input type="number" class="form-control" id="goal_amount" name="goal_amount"
                                       value="{{ fsa.goal_amount }}" min="1" step="0.01" required>
                            </div>
                            <div class="col-md-6">
                                <label for="category_id" class="form-label">Category *</label>
                                <select class="form-select" id="category_id" name="category_id" required>
                                    {% for cat in categories %}
                                        <option value="{{ cat.id }}" {% if cat.id == fsa.category_id %}selected{% endif %}>{{ cat.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="end_date" class="form-label">End Date</label>
                            <input type="date" class="form-control" id="end_date" name="end_date"
                                   value="{{ fsa.end_date.strftime('%Y-%m-%d') if fsa.end_date else '' }}">
                        </div>

                        {% if fsa.images.count() > 0 %}
                        <div class="mb-3">
                            <label class="form-label">Current Images</label>
                            <div class="d-flex gap-2 flex-wrap">
                                {% for img in fsa.images.all() %}
                                    <div class="position-relative">
                                        <img src="{{ url_for('static', filename=img.filename) }}" class="rounded"
                                             style="width: 100px; height: 80px; object-fit: cover;"
                                             onerror="this.style.display='none'">
                                        {% if img.is_primary %}<span class="badge bg-primary position-absolute top-0 start-0">Primary</span>{% endif %}
                                    </div>
                                {% endfor %}
                            </div>
                        </div>
                        {% endif %}

                        <div class="mb-3">
                            <label for="images" class="form-label">Add More Images</label>
                            <input type="file" class="form-control" id="images" name="images" accept="image/*" multiple>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                            <a href="{{ url_for('fundraiser.fsa_detail', id=fsa.id) }}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
