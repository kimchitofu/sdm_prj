{% extends 'base.html' %}
{% block title %}My Profile - FundBridge{% endblock %}
{% block content %}
<div class="container py-4">
    <h2><i class="bi bi-person-circle me-2"></i>My Profile</h2>
    <hr>
    <div class="row">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="first_name" class="form-label">First Name</label>
                                <input type="text" class="form-control" id="first_name" name="first_name" value="{{ current_user.first_name }}">
                            </div>
                            <div class="col-md-6">
                                <label for="last_name" class="form-label">Last Name</label>
                                <input type="text" class="form-control" id="last_name" name="last_name" value="{{ current_user.last_name }}">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="phone" class="form-label">Phone</label>
                            <input type="tel" class="form-control" id="phone" name="phone" value="{{ current_user.phone or '' }}">
                        </div>
                        <div class="mb-3">
                            <label for="bio" class="form-label">Bio</label>
                            <textarea class="form-control" id="bio" name="bio" rows="3">{{ current_user.bio or '' }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label for="profile_image" class="form-label">Profile Picture</label>
                            <input type="file" class="form-control" id="profile_image" name="profile_image" accept="image/*">
                        </div>
                        <button type="submit" class="btn btn-primary">Update Profile</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm text-center">
                <div class="card-body">
                    <img src="{{ url_for('static', filename=current_user.profile_image) }}"
                         class="rounded-circle mb-3" style="width: 120px; height: 120px; object-fit: cover;"
                         onerror="this.src='https://placehold.co/120/e8f5e9/2e7d32?text={{ current_user.first_name[0] }}'">
                    <h5>{{ current_user.full_name }}</h5>
                    <span class="badge bg-primary">{{ current_user.role|title }}</span>
                    <p class="text-muted small mt-2">@{{ current_user.username }}</p>
                    <p class="text-muted small">{{ current_user.email }}</p>
                    <p class="text-muted small">Member since {{ current_user.created_at|dateformat }}</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
