{% extends 'base.html' %}
{% block title %}Donate to {{ fsa.title }} - FundBridge{% endblock %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="text-center mb-2"><i class="bi bi-heart-fill text-danger me-2"></i>Make a Donation</h3>
                    <p class="text-center text-muted mb-4">{{ fsa.title }}</p>

                    <div class="text-center mb-4">
                        <div class="progress mb-2" style="height: 8px;">
                            <div class="progress-bar bg-success" style="width: {{ fsa.progress_percentage }}%"></div>
                        </div>
                        <small class="text-muted">{{ fsa.current_amount|currency }} raised of {{ fsa.goal_amount|currency }}</small>
                    </div>

                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <!-- Preset Amounts -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Select Amount</label>
                            <div class="d-flex gap-2 flex-wrap mb-2">
                                <button type="button" class="btn btn-outline-success preset-amount" data-amount="10">$10</button>
                                <button type="button" class="btn btn-outline-success preset-amount" data-amount="25">$25</button>
                                <button type="button" class="btn btn-outline-success preset-amount" data-amount="50">$50</button>
                                <button type="button" class="btn btn-outline-success preset-amount" data-amount="100">$100</button>
                            </div>
                            <input type="number" class="form-control form-control-lg" id="amount" name="amount"
                                   min="1" step="0.01" required placeholder="Enter custom amount">
                        </div>

                        <div class="mb-3">
                            <label for="message" class="form-label">Message (optional)</label>
                            <textarea class="form-control" id="message" name="message" rows="3"
                                      placeholder="Leave a message of support..."></textarea>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="is_anonymous" name="is_anonymous" value="1">
                            <label class="form-check-label" for="is_anonymous">Donate anonymously</label>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success btn-lg">
                                <i class="bi bi-heart-fill me-2"></i>Donate Now
                            </button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <a href="{{ url_for('donee.fsa_detail', id=fsa.id) }}" class="text-muted">Back to campaign</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.querySelectorAll('.preset-amount').forEach(btn => {
    btn.addEventListener('click', function() {
        document.getElementById('amount').value = this.dataset.amount;
        document.querySelectorAll('.preset-amount').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
    });
});
</script>
{% endblock %}
