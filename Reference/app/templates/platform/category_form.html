{% extends 'base.html' %}
{% block title %}{% if category %}Edit{% else %}Create{% endif %} Category - FundBridge{% endblock %}
{% block content %}
<div class="container py-4">
    <h2><i class="bi bi-tag me-2"></i>{% if category %}Edit{% else %}Create{% endif %} Category</h2>
    <hr>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-3">
                            <label for="name" class="form-label">Category Name *</label>
                            <input type="text" class="form-control" id="name" name="name"
                                   value="{{ category.name if category else '' }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="3">{{ category.description if category and category.description else '' }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label for="icon" class="form-label">Bootstrap Icon Class</label>
                            <input type="text" class="form-control" id="icon" name="icon"
                                   value="{{ category.icon if category else 'bi-heart' }}"
                                   placeholder="e.g. bi-heart, bi-hospital, bi-book">
                            <div class="form-text">Browse icons at <a href="https://icons.getbootstrap.com/" target="_blank">icons.getbootstrap.com</a></div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">{% if category %}Update{% else %}Create{% endif %} Category</button>
                            <a href="{{ url_for('platform.category_list') }}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
